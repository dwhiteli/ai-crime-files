<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Crime Files</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header reader-header">
    <div class="header-inner">
      <a href="index.html" class="logo-link">AI <span>CRIME</span> FILES</a>
      <div class="progress-pill">
        <span id="header-progress"></span>
        <div class="progress-track">
          <div class="progress-bar" id="progress-bar" style="width:0%"></div>
        </div>
      </div>
    </div>
    <nav class="reader-nav">
      <a href="index.html" id="nav-back">← All Cases</a>
      <div class="reader-nav-spacer"></div>
      <span id="nav-phase-badge" class="reader-phase-badge"></span>
      <a href="#" id="nav-next" style="color:var(--text-muted)">Next Case →</a>
    </nav>
  </header>

  <!-- Episode meta -->
  <div class="reader-meta" id="reader-meta">
    <div class="reader-case-number" id="case-number"></div>
    <h1 class="reader-title" id="episode-title"></h1>
    <p class="reader-subtitle" id="episode-subtitle"></p>
    <div class="reader-stats" id="episode-stats"></div>
  </div>

  <!-- Content injected here -->
  <div class="reader-body" id="reader-body"></div>

  <!-- Complete / nav footer -->
  <div class="reader-footer" id="reader-footer">
    <a href="#" id="footer-prev" class="btn btn-ghost">← Previous</a>
    <button class="btn btn-complete" id="btn-complete">✓ Mark Complete</button>
    <a href="#" id="footer-next" class="btn btn-primary">Next Case →</a>
  </div>

  <!-- Sticky audio player — MP3 mode (shown when podcast file exists) -->
  <div class="audio-player audio-player--podcast" id="audio-player-mp3" style="display:none">
    <div class="player-podcast-badge">🎙 PODCAST</div>
    <div class="player-info">
      <div class="player-section" id="mp3-title">Loading…</div>
      <div class="player-status">FULL EPISODE AUDIO</div>
    </div>
    <audio id="mp3-audio" controls>
      Your browser does not support audio playback.
    </audio>
  </div>

  <!-- Sticky audio player — TTS fallback (shown when no MP3 yet) -->
  <div class="audio-player" id="audio-player">
    <button class="player-play" id="player-btn" aria-label="Play narration">▶</button>
    <div class="player-info">
      <div class="player-section" id="player-section">Press play to listen to this episode</div>
      <div class="player-status" id="player-status">NARRATION READY</div>
    </div>
    <div class="player-controls">
      <select class="player-speed" id="player-speed" title="Playback speed">
        <option value="0.9">0.9×</option>
        <option value="1" selected>1×</option>
        <option value="1.2">1.2×</option>
        <option value="1.5">1.5×</option>
      </select>
      <select class="player-voice" id="player-voice" title="Narrator voice"></select>
    </div>
  </div>

  <script src="episodes.js"></script>
  <script src="reader.js"></script>

</body>
</html>
